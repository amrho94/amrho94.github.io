<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#09070f">
  <title>Lost in the Abyss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}body{display:grid;min-height:100vh;margin:0;place-items:center;overflow:hidden;color:#f7f4fb;background:radial-gradient(circle at 50% 45%,#281143 0,#0b0711 45%,#08060d 75%);font-family:"DM Sans",sans-serif;text-align:center}.wrap{position:relative;padding:30px}.code{margin:0;color:transparent;background:linear-gradient(135deg,#f2e3ff,#9d5eff 55%,#6331c8);background-clip:text;-webkit-background-clip:text;font-family:"Space Grotesk",sans-serif;font-size:clamp(110px,25vw,230px);line-height:.85;letter-spacing:-.09em;filter:drop-shadow(0 20px 50px rgba(121,55,223,.22))}h1{margin:28px 0 10px;font-family:"Space Grotesk",sans-serif;font-size:clamp(28px,5vw,46px);letter-spacing:-.04em}p{margin:0 0 28px;color:#9e97aa}.button{display:inline-flex;align-items:center;min-height:50px;padding:0 23px;border-radius:14px;color:white;background:linear-gradient(135deg,#9d5eff,#7937df);box-shadow:0 10px 30px rgba(125,52,225,.28);font-weight:700;text-decoration:none;transition:.25s ease}.button:hover{transform:translateY(-3px);box-shadow:0 16px 38px rgba(125,52,225,.42)}
  </style>
</head>
<body>
  <main class="wrap">
    <p class="code">404</p>
    <h1>Lost in the abyss.</h1>
    <p>This page drifted a little too far into the void.</p>
    <a class="button" href="./">Return home</a>
  </main>
</body>
</html>
